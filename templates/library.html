<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biblioteca de Contenido — ORIXEN</title>
<style>
:root {
  --bg: #08090a;
  --surface: #111316;
  --surface2: #1a1d21;
  --border: #252830;
  --text: #e4e4e7;
  --text2: #9899a0;
  --accent: #5e6ad2;
  --accent-dim: #3d4599;
  --green: #31A73B;
  --red: #FA383E;
  --amber: #F5C33B;
  --radius: 10px;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font);
  background: var(--bg); color: var(--text);
  line-height: 1.5; min-height: 100vh;
}
.app { display: flex; height: 100vh; }

/* ── Sidebar ─────────────────────── */
.sidebar {
  width: 240px; background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; padding: 20px 0;
  flex-shrink: 0;
}
.sidebar-header {
  padding: 0 20px 20px; border-bottom: 1px solid var(--border);
  margin-bottom: 12px;
}
.sidebar-header h1 { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
.sidebar-header .sub { font-size: 11px; color: var(--text2); margin-top: 2px; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 20px; cursor: pointer; font-size: 13px;
  color: var(--text2); border-left: 2px solid transparent;
  transition: all 0.15s; user-select: none;
}
.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active { color: var(--text); border-left-color: var(--accent); background: var(--surface2); }

/* ── Main content ──────────────────── */
.main {
  flex: 1; padding: 24px 28px; overflow-y: auto;
  display: flex; flex-direction: column;
}
.page-title {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px;
}
.page-title h2 { font-size: 20px; font-weight: 700; letter-spacing: -0.4px; }
.page-title .count { font-size: 13px; color: var(--text2); background: var(--surface); padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); }

/* ── Brand filter pills ───────────── */
.brand-pills {
  display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px;
}
.pill {
  padding: 6px 14px; border-radius: 20px; font-size: 12px;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text2); cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; gap: 6px; user-select: none;
}
.pill:hover { border-color: var(--accent-dim); color: var(--text); }
.pill.active { border-color: var(--accent); color: var(--accent); background: rgba(94,106,210,0.1); }
.pill .badge { font-size: 10px; background: var(--surface2); padding: 1px 6px; border-radius: 10px; color: var(--text2); }
.pill.active .badge { background: rgba(94,106,210,0.2); color: var(--accent); }

/* ── Status filters ──────────────── */
.filter-row {
  display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
}
.filter-btn {
  padding: 4px 12px; border-radius: 6px; font-size: 11px;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text2); cursor: pointer; transition: all 0.15s;
}
.filter-btn:hover { border-color: var(--accent-dim); }
.filter-btn.active { border-color: var(--accent); color: var(--accent); }

/* ── Content grid ──────────────────── */
.content-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
  gap: 12px;
}
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px;
  cursor: pointer; transition: all 0.15s; display: flex; flex-direction: column;
}
.card:hover { border-color: var(--accent-dim); transform: translateY(-1px); }
.card-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px; font-size: 12px;
}
.card-header .brand-name { font-weight: 600; color: var(--text); }
.card-header .platform { font-size: 10px; color: var(--text2); background: var(--surface2); padding: 2px 8px; border-radius: 4px; }
.card-header .status {
  margin-left: auto; font-size: 10px; padding: 2px 8px; border-radius: 4px;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.status.generated { background: rgba(94,106,210,0.15); color: var(--accent); }
.status.reviewed { background: rgba(245,195,59,0.15); color: var(--amber); }
.status.published { background: rgba(49,167,59,0.15); color: var(--green); }
.card-body {
  font-size: 12px; line-height: 1.6; color: var(--text2);
  flex: 1; overflow: hidden;
  display: -webkit-box; -webkit-line-clamp: 6; -webkit-box-orient: vertical;
  white-space: pre-line;
}
.card-footer {
  margin-top: 10px; font-size: 10px; color: var(--text2);
  display: flex; justify-content: space-between;
}

/* ── Modal ──────────────────────────── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
  z-index: 100; align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; width: 90%; max-width: 680px;
  max-height: 85vh; overflow-y: auto; padding: 28px;
  position: relative;
}
.modal-close {
  position: absolute; top: 16px; right: 16px;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text2); width: 32px; height: 32px; border-radius: 8px;
  cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.modal-close:hover { background: var(--border); color: var(--text); }
.modal-header { margin-bottom: 16px; }
.modal-header .brand { font-size: 12px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; }
.modal-header h3 { font-size: 18px; margin: 4px 0; font-weight: 600; }
.modal-header .meta { font-size: 11px; color: var(--text2); display: flex; gap: 12px; }
.modal-body {
  font-size: 14px; line-height: 1.7; color: var(--text);
  white-space: pre-wrap;
}
.modal-body h1, .modal-body h2, .modal-body h3 { margin: 16px 0 8px; }
.modal-body h1 { font-size: 18px; }
.modal-body h2 { font-size: 16px; }
.modal-body h3 { font-size: 14px; }
.modal-body hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
.modal-body ul, .modal-body ol { padding-left: 20px; margin: 8px 0; }
.modal-body li { margin: 4px 0; }

/* ── Empty state ───────────────────── */
.empty {
  grid-column: 1 / -1;
  text-align: center; padding: 60px 20px; color: var(--text2);
  font-size: 14px;
}
.empty .icon { font-size: 40px; margin-bottom: 12px; opacity: 0.3; }

/* ── Loading ────────────────────────── */
.loading {
  text-align: center; padding: 60px; color: var(--text2);
  font-size: 13px;
}
.spinner {
  width: 24px; height: 24px; border: 2px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 0.8s linear infinite; margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>📚 Content Library</h1>
      <div class="sub">Todo el contenido generado</div>
    </div>
    <a class="nav-item" href="/">← Content CMD</a>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="page-title">
      <h2>📖 Biblioteca por Marca</h2>
      <span class="count" id="total-count">—</span>
    </div>

    <!-- Brand pills -->
    <div class="brand-pills" id="brand-pills"></div>

    <!-- Status filters -->
    <div class="filter-row" id="status-filters"></div>

    <!-- Grid -->
    <div id="content-grid"></div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-header">
      <div class="brand" id="modal-brand"></div>
      <h3 id="modal-title"></h3>
      <div class="meta">
        <span id="modal-platform"></span>
        <span id="modal-date"></span>
        <span id="modal-status"></span>
      </div>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
// ── State ──────────────────────────────
let allContent = [];
let currentBrand = 'all';
let currentStatus = 'all';
let currentPlatform = 'all';

// ── API ────────────────────────────────
async function api(url, opts = {}) {
  const res = await fetch(url, opts);
  return res.json();
}

// ── Brand icons ────────────────────────
const brandIcons = {
  'Hz_Brand': '🎨', 'ORIXEN': '☕', 'Expand_Grow': '🤖',
  'Moon_Vibes': '🌙', 'HzK_Pro': '🎮', 'Phoenix_Squad': '🏈',
  'H_Labs': '🏪', 'Ondeska Holdings': '🏢', 'BNKR': '🏦',
  'Henry_Zarak': '👤', 'Swapital': '💱', 'TCG_Cards': '🃏'
};
function getBrandIcon(name) { return brandIcons[name] || '📝'; }

function formatBrand(name) {
  return name.replace(/_/g, ' ');
}

// ── Brand icons for platforms ──────────
const platformIcons = {
  'Instagram': '📸', 'TikTok': '🎵', 'X/Twitter': '🐦',
  'General': '📋', 'YouTube': '▶️', 'Facebook': '👍'
};
function getPlatformIcon(p) { return platformIcons[p] || '📱'; }

// ── Load ────────────────────────────────
async function loadAll() {
  const [brandsData, contentData] = await Promise.all([
    api('/api/library/brands'),
    api('/api/library/content?limit=200')
  ]);

  allContent = contentData.items;
  document.getElementById('total-count').textContent = `${contentData.total} contenidos`;

  // Brand pills
  const pillsContainer = document.getElementById('brand-pills');
  let pillsHtml = `<div class="pill active" data-brand="all" onclick="filterBrand('all')">📋 Todas <span class="badge">${contentData.total}</span></div>`;

  brandsData.brands.forEach(b => {
    pillsHtml += `<div class="pill" data-brand="${b.brand}" onclick="filterBrand('${b.brand}')">${getBrandIcon(b.brand)} ${formatBrand(b.brand)} <span class="badge">${b.total}</span></div>`;
  });
  pillsContainer.innerHTML = pillsHtml;

  // Status filters
  const sf = document.getElementById('status-filters');
  sf.innerHTML = `
    <div class="filter-btn active" data-status="all" onclick="filterStatus('all')">Todos</div>
    <div class="filter-btn" data-status="generated" onclick="filterStatus('generated')">⚡ Generados</div>
    <div class="filter-btn" data-status="reviewed" onclick="filterStatus('reviewed')">👁️ Revisados</div>
    <div class="filter-btn" data-status="published" onclick="filterStatus('published')">✅ Publicados</div>
  `;

  render();
}

// ── Filter ──────────────────────────────
function filterBrand(brand) {
  currentBrand = brand;
  document.querySelectorAll('.brand-pills .pill').forEach(p => {
    p.classList.toggle('active', p.dataset.brand === brand);
  });
  render();
}

function filterStatus(status) {
  currentStatus = status;
  document.querySelectorAll('.filter-row .filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.status === status);
  });
  render();
}

// ── Render ──────────────────────────────
function render() {
  let filtered = allContent;

  if (currentBrand !== 'all') {
    filtered = filtered.filter(c => c.brand === currentBrand);
  }
  if (currentStatus !== 'all') {
    filtered = filtered.filter(c => c.status === currentStatus);
  }

  const grid = document.getElementById('content-grid');

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty"><div class="icon">📭</div>No hay contenido con estos filtros</div>`;
    return;
  }

  grid.innerHTML = filtered.map(c => {
    const bodyPreview = (c.body || '').replace(/[*#_`\[\]]/g, '').substring(0, 250);
    const date = (c.created_at || '').substring(0, 10);
    const statusClass = c.status || 'generated';
    return `
      <div class="card" onclick="openModal(${c.id})">
        <div class="card-header">
          <span class="brand-name">${getBrandIcon(c.brand)} ${formatBrand(c.brand)}</span>
          <span class="platform">${getPlatformIcon(c.platform)} ${c.platform}</span>
          <span class="status ${statusClass}">${c.status}</span>
        </div>
        <div class="card-body">${bodyPreview}</div>
        <div class="card-footer">
          <span>${date}</span>
          <span>${c.content_type || '—'}</span>
        </div>
      </div>
    `;
  }).join('');
}

// ── Modal ──────────────────────────────
function openModal(id) {
  const item = allContent.find(c => c.id === id);
  if (!item) return;

  const modal = document.getElementById('modal');
  modal.classList.add('open');

  document.getElementById('modal-brand').textContent = `${getBrandIcon(item.brand)} ${formatBrand(item.brand)}`;
  document.getElementById('modal-title').textContent = `${getPlatformIcon(item.platform)} ${item.platform} — ${item.content_type || 'contenido'}`;
  document.getElementById('modal-platform').textContent = `📱 ${item.platform}`;
  document.getElementById('modal-date').textContent = `📅 ${(item.created_at || '').substring(0, 10)}`;
  document.getElementById('modal-status').textContent = `📌 ${item.status}`;

  // Render markdown-ish body with basic formatting
  const body = item.body || '*Sin contenido*';
  document.getElementById('modal-body').innerHTML = formatBody(body);

  // Prevent body scroll
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

function formatBody(text) {
  // Escape HTML
  let html = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  // Bold
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Italic
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Inline code
  html = html.replace(/`(.+?)`/g, '<code style="background:var(--surface2);padding:1px 5px;border-radius:3px;font-size:12px;">$1</code>');
  // Headers
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // Horizontal rules
  html = html.replace(/^---$/gm, '<hr>');
  // Lines starting with > (blockquote)
  html = html.replace(/^&gt; (.+)$/gm, '<blockquote style="border-left:2px solid var(--accent);padding-left:12px;margin:6px 0;color:var(--text2);">$1</blockquote>');
  // Lines starting with - or * (lists)
  html = html.replace(/^[-*] (.+)$/gm, '<li style="margin:2px 0;">$1</li>');
  // Numbered lists
  html = html.replace(/^\d+\.\s(.+)$/gm, '<li style="margin:2px 0;">$1</li>');
  // Newlines
  html = html.replace(/\n\n/g, '</p><p>');
  html = html.replace(/\n/g, '<br>');

  return '<p>' + html + '</p>';
}

// ── Keyboard ────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// Close modal on overlay click
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

// ── Init ────────────────────────────────
loadAll();
</script>
</body>
</html>
